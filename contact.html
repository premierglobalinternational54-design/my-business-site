<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - S.R. Premier</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; min-height: 100%; font-family: 'Montserrat', sans-serif; background-color: #040914; overflow-x: hidden; color: #fff; }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 1; pointer-events: none; }
        
        .contact-wrapper { position: relative; z-index: 50; max-width: 1100px; margin: 60px auto 50px; padding: 0 20px; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; text-align: center; color: #d4af37; margin-bottom: 30px; }

        .social-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .social-link { font-size: 1.8rem; color: #d4af37; transition: 0.4s; }
        
        .contact-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .contact-box { background: rgba(10, 15, 25, 0.7); border: 1px solid rgba(212, 175, 55, 0.2); padding: 25px; border-radius: 10px; backdrop-filter: blur(5px); }
        
        .contact-info p { margin-bottom: 15px; font-size: 1rem; }
        
        /* Buttons Styling */
        .btn-action { display: block; width: 100%; padding: 12px; margin-top: 10px; text-align: center; text-decoration: none; font-weight: bold; border-radius: 5px; border: none; cursor: pointer; transition: 0.3s; }
        .btn-call { background: #d4af37; color: #040914; }
        .btn-email { background: rgba(212, 175, 55, 0.1); color: #d4af37; border: 1px solid #d4af37; }
        
        .form-control { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(212, 175, 55, 0.3); color: #fff; padding: 10px 0; margin-bottom: 15px; }
        .btn-submit { padding: 12px; border: 1px solid #d4af37; background: transparent; color: #d4af37; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-submit:hover { background: #d4af37; color: #040914; }

        @media (min-width: 768px) { 
            .contact-grid { grid-template-columns: 1fr 1.2fr; gap: 30px; }
            .section-title { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="contact-wrapper">
        <h1 class="section-title">CONTACT US</h1>

        <div class="social-container">
            <a href="https://wa.me/94718888609" target="_blank" class="social-link"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.facebook.com/share/193FdeSz5D/?mibextid=wwXIfr" target="_blank" class="social-link"><i class="fab fa-facebook"></i></a>
            <a href="https://www.tiktok.com/@sr.branded?_r=1&_t=ZS-97ripYqaiVr" target="_blank" class="social-link"><i class="fab fa-tiktok"></i></a>
        </div>

        <div class="contact-grid">
            <div class="contact-box contact-info">
                <h3>Get In Touch</h3>
                <p>Hotline: 071 888 8609</p>
                <p>Email: srpremierglobalservice@gmail.com</p>
                <a href="tel:0718888609" class="btn-action btn-call">CALL NOW</a>
                <a href="mailto:srpremierglobalservice@gmail.com" class="btn-action btn-email">SEND EMAIL</a>
            </div>
            <div class="contact-box">
                <h3>Send a Message</h3>
                <form id="msgForm">
                    <input type="text" id="userName" class="form-control" placeholder="Your Name" required>
                    <textarea id="userMsg" class="form-control" placeholder="Your Message" required></textarea>
                    <button type="button" class="btn-submit" onclick="sendWhatsApp()">SEND VIA WHATSAPP</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        function sendWhatsApp() {
            let name = document.getElementById('userName').value;
            let msg = document.getElementById('userMsg').value;
            let url = "https://wa.me/94718888609?text=Hi, I am " + name + ". " + msg;
            window.open(url, '_blank');
        }
        particlesJS("particles-js", { "particles": { "number": { "value": 50 }, "color": { "value": "#d4af37" }, "opacity": { "value": 0.3 } } });
    </script>
</body>
</html>

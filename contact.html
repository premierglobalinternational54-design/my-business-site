<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - S.R. Premier</title>
    
    <!-- Ultra-Luxury Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; min-height: 100%; font-family: 'Montserrat', sans-serif; background-color: #040914; overflow-x: hidden; color: #fff; }
        
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 1; pointer-events: none; }
        
        .desktop-nav { position: fixed; top: 0; left: 0; width: 100%; padding: 30px 50px; display: flex; justify-content: center; align-items: center; gap: 60px; z-index: 100; background: linear-gradient(to bottom, rgba(4, 9, 20, 0.95) 0%, rgba(4, 9, 20, 0) 100%); border-bottom: 1px solid rgba(212, 175, 55, 0.15); backdrop-filter: blur(8px); }
        .desktop-nav a { font-family: 'Playfair Display', serif; color: #d4af37; text-decoration: none; font-size: 15px; letter-spacing: 3px; transition: all 0.4s ease; font-weight: 500; text-transform: uppercase; }
        
        .menu-btn { display: none; position: fixed; top: 25px; right: 25px; z-index: 1000; cursor: pointer; flex-direction: column; gap: 6px; }
        .menu-btn span { width: 30px; height: 2px; background-color: #d4af37; transition: 0.3s; }

        .contact-wrapper { position: relative; z-index: 50; max-width: 1100px; margin: 150px auto 50px; padding: 0 20px; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 3.8rem; text-align: center; color: #d4af37; margin-bottom: 60px; }

        /* Social Icons Section */
        .social-container { display: flex; justify-content: center; gap: 30px; margin-bottom: 50px; }
        .social-link { font-size: 2.5rem; color: #d4af37; transition: 0.4s; }
        .social-link:hover { color: #fff; transform: scale(1.2); }

        .contact-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; }
        .contact-box { background: rgba(10, 15, 25, 0.6); border: 1px solid rgba(212, 175, 55, 0.15); padding: 50px; border-radius: 8px; backdrop-filter: blur(5px); }
        
        .form-control { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(212, 175, 55, 0.3); color: #fff; padding: 10px 0; margin-bottom: 20px; }
        .btn-submit { padding: 15px; border: 1px solid #d4af37; background: transparent; color: #d4af37; width: 100%; cursor: pointer; transition: 0.4s; }
        .btn-submit:hover { background: #d4af37; color: #040914; }

        @media (max-width: 768px) {
            .menu-btn { display: flex; }
            .desktop-nav { display: none; } /* Simplified for mobile */
            .section-title { font-size: 2.5rem; }
            .contact-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav class="desktop-nav" id="navMenu">
        <a href="Home.html">HOME</a><a href="service.html">SERVICES</a><a href="about.html">ABOUT</a><a href="logistics.html">LOGISTICS</a><a href="contact.html">CONTACT</a>
    </nav>

    <div class="contact-wrapper">
        <h1 class="section-title">CONTACT US</h1>

        <!-- Social Media Icons -->
        <div class="social-container">
            <a href="https://wa.me/94718888609" target="_blank" class="social-link"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.facebook.com/share/193FdeSz5D/?mibextid=wwXIfr" target="_blank" class="social-link"><i class="fab fa-facebook"></i></a>
            <a href="https://www.tiktok.com/@sr.branded?_r=1&_t=ZS-97ripYqaiVr" target="_blank" class="social-link"><i class="fab fa-tiktok"></i></a>
        </div>

        <div class="contact-grid">
            <div class="contact-box">
                <h3>Get In Touch</h3>
                <p>Hotline: 071 888 8609</p>
                <p>Email: premierglobalinternational54@gmail.com</p>
            </div>
            <div class="contact-box">
                <h3>Send a Message</h3>
                <form>
                    <input type="text" class="form-control" placeholder="Your Name">
                    <input type="email" class="form-control" placeholder="Your Email">
                    <textarea class="form-control" placeholder="Your Message"></textarea>
                    <button type="button" class="btn-submit">SUBMIT INQUIRY</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": { "number": { "value": 50 }, "color": { "value": "#d4af37" }, "opacity": { "value": 0.3 } }
        });
    </script>
</body>
</html>

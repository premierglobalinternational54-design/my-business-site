<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Planning - S.R. Premier</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #040914; color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 1; }
        
        .content-wrapper { position: relative; z-index: 50; max-width: 800px; margin: 50px auto; padding: 0 20px; text-align: center; }
        
        .btn-back { display: inline-block; padding: 10px 25px; border: 1px solid #d4af37; color: #d4af37; text-decoration: none; border-radius: 30px; margin-bottom: 30px; transition: 0.3s; }
        .btn-back:hover { background: #d4af37; color: #040914; }

        .hero-title { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: #d4af37; margin-bottom: 20px; }
        
        /* The Single Photo */
        .main-photo { width: 100%; max-height: 400px; object-fit: cover; border-radius: 15px; border: 2px solid #d4af37; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .description { font-size: 1.2rem; line-height: 1.8; color: #ccc; margin-bottom: 30px; }

        .btn-whatsapp { display: inline-block; padding: 20px 60px; background: #25D366; color: white; text-decoration: none; font-size: 1.2rem; border-radius: 50px; font-weight: bold; transition: 0.3s; box-shadow: 0 0 20px rgba(37, 211, 102, 0.4); }
        .btn-whatsapp:hover { background: #128C7E; transform: scale(1.05); }

        @media (max-width: 768px) { .hero-title { font-size: 2.5rem; } }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="content-wrapper">
        <a href="Home.html" class="btn-back">← GO BACK</a>
        
        <h1 class="hero-title">EVENT PLANNING</h1>
        
        <!-- ඔයාගේ එක ෆොටෝ එක මෙතන දාන්න (event.jpg කියලා නම දෙන්න) -->
        <img src="event.jpg" alt="Event Planning" class="main-photo">
        
        <p class="description">
            Crafting moments that last a lifetime. From intimate celebrations to grand corporate galas, 
            we bring your vision to life with precision, elegance, and unmatched style. 
            Let us handle the details while you enjoy the occasion.
        </p>
        
        <a href="https://wa.me/94718888609?text=I%20would%20like%20to%20plan%20an%20event!" class="btn-whatsapp" target="_blank">
            BOOK YOUR CONSULTATION
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": { "number": { "value": 50 }, "color": { "value": "#d4af37" }, "opacity": { "value": 0.3 } },
            "interactivity": { "detect_on": "canvas" }, "retina_detect": true
        });
    </script>
</body>
</html>

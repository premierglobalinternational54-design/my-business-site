<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PRODUCTS- S.R. Premier</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #040914; color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 1; pointer-events: none; }
        
        .content-wrapper { position: relative; z-index: 50; max-width: 1100px; margin: 50px auto; padding: 0 20px; text-align: center; }
        
        .btn-back { display: inline-block; padding: 10px 25px; border: 1px solid #d4af37; color: #d4af37; text-decoration: none; border-radius: 30px; margin-bottom: 30px; transition: 0.3s; }
        .btn-back:hover { background: #d4af37; color: #040914; }

        .hero-title { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: #d4af37; margin-bottom: 20px; text-transform: uppercase; }

        /* Search & Filter */
        .search-container { margin-bottom: 30px; }
        #searchInput { width: 100%; max-width: 400px; padding: 15px; border-radius: 30px; border: 1px solid #d4af37; background: rgba(255,255,255,0.05); color: #fff; font-size: 1rem; outline: none; }
        
        .filters { margin-bottom: 40px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid #d4af37; color: #d4af37; padding: 10px 25px; cursor: pointer; border-radius: 30px; transition: 0.3s; }
        .filter-btn:hover, .filter-btn.active { background: #d4af37; color: #040914; }

        /* Product Grid */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .product-card { background: rgba(255, 255, 255, 0.03); border: 1px solid #333; border-radius: 15px; padding: 20px; transition: 0.4s; text-align: center; }
        .product-card:hover { border-color: #d4af37; transform: translateY(-10px); }
        .product-card img { width: 100%; height: 220px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; border: 1px solid #d4af37; }
        .product-card h3 { color: #fff; margin-bottom: 10px; }
        .product-card p { color: #d4af37; font-weight: bold; margin-bottom: 20px; }
        .btn-buy { display: block; padding: 12px; background: #25D366; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; transition: 0.3s; }
        .btn-buy:hover { background: #128C7E; }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="content-wrapper">
        <a href="service.html" class="btn-back">← GO BACK</a>
        <h1 class="hero-title">PRODUCTS</h1>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search for premium electronics...">
        </div>
        
        <div id="filterContainer" class="filters"></div>
        <div id="productGrid" class="product-grid"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": { "number": { "value": 60 }, "color": { "value": "#d4af37" }, "opacity": { "value": 0.4 } },
            "interactivity": { "detect_on": "canvas" }, "retina_detect": true
        });

        // ඔයාට ලැබුණු නවතම Web App URL එක මෙතන දාන්න
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbwOpELAjY-_M_B8WCPwvsw3kNteady4BOMfjUweowR_yGSgMnGzaqlcy1pQ9QLxDs6pEA/exec'; 
    let products = [];

    async function init() {
        try {
            const res = await fetch(scriptUrl);
            const data = await res.json(); // දැන් අපි JSON ගන්නවා
            // පළමු පේළිය (Headers) මඟ හරින්න
            const rows = data.slice(1); 
            
            products = rows.map(row => {
                // row එකේ තියෙන්නේ [Name, Price, Category, ImageURL] ලෙසයි
                return { name: row[0], price: row[1], category: row[2], imgUrl: row[3] };
            }).filter(p => p.name);

            renderFilters();
            renderProducts(products);
        } catch(e) { console.error("Error:", e); }
    }

        function renderFilters() {
            const container = document.getElementById('filterContainer');
            const categories = ['All', ...new Set(products.map(p => p.category))];
            container.innerHTML = categories.map(cat => 
                `<button class="filter-btn" onclick="filterData('${cat}', this)">${cat}</button>`
            ).join('');
        }

        function filterData(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = cat === 'All' ? products : products.filter(p => p.category === cat);
            renderProducts(filtered);
        }

        function renderProducts(list) {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = list.map(p => {
        // මෙතන තමයි අපි මැසේජ් එක ලස්සන කරන්නේ
        const message = `Hello! I would like to order: ${p.name}. Price: Rs. ${p.price}. Please confirm.`;
        const whatsappLink = `https://wa.me/94718888609?text=${encodeURIComponent(message)}`;
        
        return `
        <div class="product-card">
            <img src="${p.imgUrl}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/200?text=No+Image'">
            <h3>${p.name}</h3>
            <p>Rs. ${p.price}</p>
            <a href="${whatsappLink}" class="btn-buy" target="_blank">ORDER VIA WHATSAPP</a>
        </div>
        `;
    }).join('');
}

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            renderProducts(products.filter(p => p.name.toLowerCase().includes(val)));
        });

        init();
    </script>
</body>
</html>
